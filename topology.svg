<svg viewBox="0 0 980 1180" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <style>
      .zlabel { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
      .item   { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; fill: #0E1620; }
      .fw     { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; font-weight: 600; fill: #FFFFFF; letter-spacing: 0.04em; }
      .rule   { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11.5px; fill: #C9D2DD; }
      .side   { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; fill: #3A4756; }
      .sidelabel { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6B7888"/>
    </marker>
  </defs>

  <rect width="980" height="1180" fill="#F5F7FA"/>

  <!-- ===== Vertical connector spine ===== -->
  <line x1="490" y1="120" x2="490" y2="1010" stroke="#C3CCD7" stroke-width="2"/>

  <!-- ===== INTERNET (untrusted) ===== -->
  <rect x="310" y="36" width="360" height="84" rx="12" fill="#FBEFEE" stroke="#C2463A" stroke-width="1.5"/>
  <rect x="310" y="36" width="6" height="84" rx="3" fill="#C2463A"/>
  <text x="490" y="70" text-anchor="middle" class="zlabel" fill="#C2463A">INTERNET</text>
  <text x="490" y="94" text-anchor="middle" class="item" fill="#3A4756">Untrusted — all inbound treated as suspicious</text>

  <!-- ===== Firewall 1 ===== -->
  <rect x="300" y="148" width="380" height="44" rx="8" fill="#2A3645"/>
  <text x="490" y="168" text-anchor="middle" class="fw">PERIMETER FIREWALL</text>
  <text x="490" y="184" text-anchor="middle" class="rule">deny by default · permit HTTPS → web server</text>

  <!-- ===== DMZ ===== -->
  <rect x="270" y="222" width="440" height="120" rx="12" fill="#FBF3E6" stroke="#C77F1A" stroke-width="1.5"/>
  <rect x="270" y="222" width="6" height="120" rx="3" fill="#C77F1A"/>
  <text x="300" y="250" class="zlabel" fill="#C77F1A">DMZ</text>
  <text x="300" y="268" class="side">Public-facing services only — contained if compromised</text>
  <rect x="300" y="284" width="120" height="40" rx="7" fill="#FFFFFF" stroke="#E4CBA0"/>
  <text x="360" y="309" text-anchor="middle" class="item">Web server</text>
  <rect x="432" y="284" width="135" height="40" rx="7" fill="#FFFFFF" stroke="#E4CBA0"/>
  <text x="499" y="309" text-anchor="middle" class="item">Email gateway</text>
  <rect x="579" y="284" width="100" height="40" rx="7" fill="#FFFFFF" stroke="#E4CBA0"/>
  <text x="629" y="309" text-anchor="middle" class="item">DNS</text>

  <!-- ===== Firewall 2 ===== -->
  <rect x="300" y="372" width="380" height="44" rx="8" fill="#2A3645"/>
  <text x="490" y="392" text-anchor="middle" class="fw">INTERNAL FIREWALL</text>
  <text x="490" y="408" text-anchor="middle" class="rule">deny all but specific application traffic</text>

  <!-- ===== INTERNAL (with VLANs) ===== -->
  <rect x="250" y="446" width="480" height="200" rx="12" fill="#ECF2F7" stroke="#1E5F8C" stroke-width="1.5"/>
  <rect x="250" y="446" width="6" height="200" rx="3" fill="#1E5F8C"/>
  <text x="280" y="474" class="zlabel" fill="#1E5F8C">INTERNAL CORPORATE</text>
  <text x="280" y="492" class="side">Can initiate outward · external cannot initiate in · VLAN routing via firewall</text>
  <rect x="280" y="508" width="200" height="44" rx="7" fill="#FFFFFF" stroke="#BBD0E0"/>
  <text x="380" y="535" text-anchor="middle" class="item">VLAN — Staff PCs</text>
  <rect x="496" y="508" width="204" height="44" rx="7" fill="#FFFFFF" stroke="#BBD0E0"/>
  <text x="598" y="535" text-anchor="middle" class="item">VLAN — VoIP</text>
  <rect x="280" y="564" width="200" height="44" rx="7" fill="#FFFFFF" stroke="#BBD0E0"/>
  <text x="380" y="591" text-anchor="middle" class="item">VLAN — HR</text>
  <rect x="496" y="564" width="204" height="44" rx="7" fill="#FFFFFF" stroke="#BBD0E0"/>
  <text x="598" y="591" text-anchor="middle" class="item">VLAN — Customer-facing</text>

  <!-- ===== Firewall 3 ===== -->
  <rect x="300" y="676" width="380" height="44" rx="8" fill="#2A3645"/>
  <text x="490" y="696" text-anchor="middle" class="fw">SERVER-ZONE FIREWALL</text>
  <text x="490" y="712" text-anchor="middle" class="rule">only the authenticated application reaches its database</text>

  <!-- ===== RESTRICTED SERVER ZONE ===== -->
  <rect x="270" y="750" width="440" height="130" rx="12" fill="#EAF4EF" stroke="#2E7D5B" stroke-width="1.5"/>
  <rect x="270" y="750" width="6" height="130" rx="3" fill="#2E7D5B"/>
  <text x="300" y="778" class="zlabel" fill="#2E7D5B">RESTRICTED SERVER ZONE</text>
  <text x="300" y="796" class="side">The targeted zone — isolated; only authenticated systems reach it</text>
  <rect x="300" y="812" width="120" height="44" rx="7" fill="#FFFFFF" stroke="#AED2C1"/>
  <text x="360" y="839" text-anchor="middle" class="item">File servers</text>
  <rect x="432" y="812" width="120" height="44" rx="7" fill="#FFFFFF" stroke="#AED2C1"/>
  <text x="492" y="839" text-anchor="middle" class="item">Databases</text>
  <rect x="564" y="812" width="115" height="44" rx="7" fill="#FFFFFF" stroke="#AED2C1"/>
  <text x="621" y="833" text-anchor="middle" class="item">Customer</text>
  <text x="621" y="849" text-anchor="middle" class="item">records</text>

  <!-- ===== MANAGEMENT ZONE (isolated, right) ===== -->
  <rect x="752" y="372" width="208" height="120" rx="12" fill="#F0EDF6" stroke="#5B4B8A" stroke-width="1.5"/>
  <rect x="752" y="372" width="6" height="120" rx="3" fill="#5B4B8A"/>
  <text x="776" y="400" class="sidelabel" fill="#5B4B8A">MANAGEMENT</text>
  <text x="776" y="420" class="side">Device admin only</text>
  <text x="776" y="438" class="side">(firewalls, switches,</text>
  <text x="776" y="454" class="side">routers)</text>
  <text x="776" y="478" class="side" font-style="italic">Fully isolated</text>
  <line x1="680" y1="394" x2="752" y2="432" stroke="#5B4B8A" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- ===== VPN (remote access, left) ===== -->
  <rect x="20" y="446" width="208" height="150" rx="12" fill="#FFFFFF" stroke="#C3CCD7" stroke-width="1.5"/>
  <text x="44" y="474" class="sidelabel" fill="#1E5F8C">REMOTE ACCESS</text>
  <text x="44" y="496" class="side">Remote workers → SSL VPN</text>
  <text x="44" y="514" class="side">Branch ↔ HQ → IPSec VPN</text>
  <line x1="44" y1="528" x2="204" y2="528" stroke="#DCE2EA"/>
  <text x="44" y="552" class="side" font-weight="600" fill="#0E1620">VPN + MFA</text>
  <text x="44" y="572" class="side">Encrypted tunnel + second</text>
  <text x="44" y="588" class="side">factor before any access</text>
  <line x1="228" y1="528" x2="250" y2="540" stroke="#1E5F8C" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- ===== Flow arrows on spine ===== -->
  <line x1="490" y1="120" x2="490" y2="146" stroke="#6B7888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="192" x2="490" y2="220" stroke="#6B7888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="342" x2="490" y2="370" stroke="#6B7888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="646" x2="490" y2="674" stroke="#6B7888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Caption ===== -->
  <text x="490" y="935" text-anchor="middle" class="side" font-weight="600" fill="#0E1620">Every boundary runs deny-by-default. A breach is contained to one zone;</text>
  <text x="490" y="955" text-anchor="middle" class="side" font-weight="600" fill="#0E1620">firewall rules block lateral movement between zones.</text>

  <!-- ===== Legend ===== -->
  <text x="40" y="1030" class="side" font-weight="600" fill="#0E1620">TRUST LEVEL</text>
  <rect x="40" y="1044" width="16" height="16" rx="3" fill="#FBEFEE" stroke="#C2463A"/>
  <text x="64" y="1057" class="side">Untrusted</text>
  <rect x="160" y="1044" width="16" height="16" rx="3" fill="#FBF3E6" stroke="#C77F1A"/>
  <text x="184" y="1057" class="side">DMZ</text>
  <rect x="250" y="1044" width="16" height="16" rx="3" fill="#ECF2F7" stroke="#1E5F8C"/>
  <text x="274" y="1057" class="side">Internal</text>
  <rect x="360" y="1044" width="16" height="16" rx="3" fill="#EAF4EF" stroke="#2E7D5B"/>
  <text x="384" y="1057" class="side">Restricted</text>
  <rect x="480" y="1044" width="16" height="16" rx="3" fill="#F0EDF6" stroke="#5B4B8A"/>
  <text x="504" y="1057" class="side">Management</text>
</svg>
